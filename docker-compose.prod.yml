services:
  db:
    image: docker.io/library/postgres:16-alpine
    container_name: jorge-db
    hostname: db
    restart: always
    environment:
      POSTGRES_DB: jorchos_db
      POSTGRES_USER: jorchos_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    container_name: jorge-backend
    hostname: backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/jorchos_db
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: jorchos_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    container_name: jorge-frontend
    hostname: frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  victoriametrics:
    image: docker.io/victoriametrics/victoria-metrics:v1.112.0
    container_name: jorge-victoriametrics
    hostname: victoriametrics
    restart: always
    command:
      - --storageDataPath=/victoria-metrics-data
      - --retentionPeriod=14d
      - --promscrape.config=/etc/victoriametrics/prometheus.yml
    volumes:
      - victoriametrics_data:/victoria-metrics-data
      - ./scripts/observability/victoriametrics/prometheus.yml:/etc/victoriametrics/prometheus.yml:ro
    depends_on:
      - backend
      - db

  loki:
    image: docker.io/grafana/loki:3.2.1
    container_name: jorge-loki
    hostname: loki
    restart: always
    command: -config.file=/etc/loki/config.yml
    volumes:
      - loki_data:/loki
      - ./scripts/observability/loki/config.yml:/etc/loki/config.yml:ro

  promtail:
    image: docker.io/grafana/promtail:3.2.1
    container_name: jorge-promtail
    hostname: promtail
    restart: always
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./scripts/observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /home/jorchadmin/.local/share/containers/storage/overlay-containers:/var/log/podman:ro
    depends_on:
      - loki

  node-exporter:
    image: docker.io/prom/node-exporter:v1.8.2
    container_name: jorge-node-exporter
    hostname: node-exporter
    restart: always
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run/credentials/.+)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: jorge-postgres-exporter
    hostname: postgres-exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: postgresql://jorchos_user:${POSTGRES_PASSWORD}@db:5432/jorchos_db?sslmode=disable
    depends_on:
      - db

  grafana:
    image: docker.io/grafana/grafana-oss:11.2.0
    container_name: jorge-grafana
    hostname: grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./scripts/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./scripts/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - victoriametrics
      - loki

volumes:
  postgres_data:
  victoriametrics_data:
  loki_data:
  grafana_data:
