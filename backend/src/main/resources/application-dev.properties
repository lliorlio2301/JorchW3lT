# Development Profile Optimization
spring.main.lazy-initialization=true

# Database (H2 In-Memory for maximum speed)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate & Flyway Sync
# Flyway performs migrations, Hibernate only validates. This is faster and safer.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# H2 Console for easier debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Faster Restart with DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Logging
logging.level.Jorch.w3Lt.Jorge=INFO
