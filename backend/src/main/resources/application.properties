spring.application.name=Jorge

# Database Configuration
# Defaults to H2 for local development, matches .env variable names where possible
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:password}}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=false

# Security Configuration
# Uses JWT_SECRET_KEY from .env, with a secure fallback
application.security.jwt.secret-key=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# H2 Console (only for local dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Monitoring (Phase 5 - Actuator)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Performance Optimization for Lean deployment
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
