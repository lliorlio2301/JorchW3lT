spring.application.name=Jorge

# Database Configuration
# Default to H2 for local development, can be overridden by environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=false

# H2 Console (only for local dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Monitoring (Phase 5 - Actuator)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Performance Optimization for Lean deployment
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
