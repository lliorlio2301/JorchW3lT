global:
  scrape_interval: 15s

scrape_configs:
  - job_name: backend-actuator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - backend:8080

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: promtail
    static_configs:
      - targets:
          - promtail:9080

  - job_name: victoriametrics-self
    static_configs:
      - targets:
          - victoriametrics:8428
