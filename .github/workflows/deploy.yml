name: CI/CD Deployment to VPS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Backend Tests
        run: cd backend && mvn test
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Frontend Dependencies
        run: cd frontend && npm ci
      - name: Run Frontend Vitest
        run: cd frontend && npm test
      - name: Install Playwright Browsers
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Run Playwright E2E Tests
        run: cd frontend && npm run test:e2e

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Lowercase repo name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.native
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/backend:latest
      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare docker-compose file
        run: |
          REPO_LOWER=${GITHUB_REPOSITORY,,}
          # Replace the placeholder with the actual lowercase repository name
          sed "s|\${GITHUB_REPOSITORY}|$REPO_LOWER|g" docker-compose.prod.yml > docker-compose.yml

      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: jorchadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/jorchadmin/app"

      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: jorchadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/jorchadmin/app
            
            # Update or Create .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" > .env
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
            echo "POSTGRES_USER=jorchos_user" >> .env
            echo "POSTGRES_DB=jorchos_db" >> .env
            
            # Login, Pull and Restart
            echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
            podman-compose pull
            podman-compose down || true
            # Clean up dangling networks to fix DNS/Networking issues on some Podman versions
            podman network prune -f
            podman-compose up -d
