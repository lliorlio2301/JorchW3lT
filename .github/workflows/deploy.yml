name: CI/CD Deployment to VPS

on:
  push:
    branches: [ master ]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build and push Backend (Native Image)
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.native
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build and push Frontend
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: jorchadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            # Create a simple .env if not exists (minimal placeholders)
            if [ ! -f .env ]; then
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" > .env
              echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
            fi
            
            # Login to GHCR on the VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Update docker-compose file
            cat << 'EOF' > docker-compose.yml
            ${{ steps.get-content.outputs.content }}
            EOF
            # (Wait, cat-ing from GHA is tricky, we'll use scp instead or a simple pull)
            
      - name: Copy docker-compose and .env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: jorchadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/app"
          strip_components: 0

      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: jorchadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            mv docker-compose.prod.yml docker-compose.yml
            # Set GITHUB_REPOSITORY for the images in docker-compose.yml
            # (In production, the tag is hardcoded or we use env replacement)
            sed -i "s/\${GITHUB_REPOSITORY}/${{ github.repository }}/g" docker-compose.yml
            
            # Pull and Restart
            podman-compose pull
            podman-compose down
            podman-compose up -d
