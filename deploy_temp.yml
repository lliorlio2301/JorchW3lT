name: CI/CD Deployment to VPS

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Choose the scope of deployment'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-backend:
    if: github.event.inputs.scope == 'all' || github.event.inputs.scope == 'backend'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Lowercase repo name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.native
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/backend:latest

  build-frontend:
    if: github.event.inputs.scope == 'all' || github.event.inputs.scope == 'frontend'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Lowercase repo name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare docker-compose file
        run: |
          REPO_LOWER=${GITHUB_REPOSITORY,,}
          cp docker-compose.prod.yml docker-compose.yml
          sed -i "s|\${GITHUB_REPOSITORY}|$REPO_LOWER|g" docker-compose.yml
          sed -i "s|\${POSTGRES_PASSWORD}|${{ secrets.POSTGRES_PASSWORD }}|g" docker-compose.yml
          sed -i "s|\${JWT_SECRET_KEY}|${{ secrets.JWT_SECRET_KEY }}|g" docker-compose.yml
          sed -i "s|\${PODMAN_UID:-1000}|1000|g" docker-compose.yml
          
          if grep -q "\${" docker-compose.yml; then
            echo "Some placeholders were not replaced!"
            grep "\${" docker-compose.yml
            exit 1
          fi
          test -f scripts/observability/victoriametrics/prometheus.yml
          test -f scripts/observability/loki/config.yml
          test -f scripts/observability/promtail/config.yml
          echo "Docker-compose file prepared successfully."

      - name: Copy deployment files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: jorchadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,scripts/"
          target: "/home/jorchadmin/app"

      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: jorchadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/jorchadmin/app
            
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" > .env
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
            echo "POSTGRES_USER=jorchos_user" >> .env
            echo "POSTGRES_DB=jorchos_db" >> .env
            echo "PODMAN_UID=1000" >> .env
            
            echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
            podman-compose pull
            podman-compose down || true
            podman network prune -f
            podman-compose up -d
